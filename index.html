- UN자료: 43,800여 책 / EU자료: 9,100여 책 / OECD자료: 9,400여 책

=== 대출/반납 규정 ===
- 학부생: 30책, 15일, 연장 15일 3회
- 대학원생/직원: 60책, 30일, 연장 30일 3회
- 교원: 90책, 90일, 연장 90일 3회
- 연회비 이용자/교환학생(학부): 10책, 15일, 연장 15일 1회
- 연장: 반납예정일 5일 전부터, 예약자 없을 때만 가능
- 연체: 연체일 수만큼 대출 중지 / 30일 이상 시 출입 중지
- 변상: 동일도서로 변상 (중고 불가, 절판 시 담당자 지정 자료)

=== 시설 예약 ===
- 홈페이지: library.korea.ac.kr 시설·좌석 예약·현황 메뉴
- 모바일 앱: KLIB`;

let messages = [];
let loading = false;

function addMessage(role, content) {
  messages.push({ role, content });
  renderMessages();
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';

  messages.forEach(m => {
    const row = document.createElement('div');
    row.className = `msg-row ${m.role}`;

    if (m.role === 'assistant') {
      const icon = document.createElement('div');
      icon.className = 'bot-icon';
      icon.textContent = '📚';
      row.appendChild(icon);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${m.role}`;
    bubble.textContent = m.content;
    row.appendChild(bubble);
    container.appendChild(row);
  });

  if (loading) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing-row';
    const icon = document.createElement('div');
    icon.className = 'bot-icon';
    icon.textContent = '📚';
    const dots = document.createElement('div');
    dots.className = 'bubble assistant typing-dots';
    [0, 1, 2].forEach(i => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.style.animationDelay = `${i * 0.22}s`;
      dots.appendChild(d);
    });
    row.appendChild(icon);
    row.appendChild(dots);
    container.appendChild(row);
  }

  container.scrollTop = container.scrollHeight;

  // 처음 메시지 후 빠른질문 숨기기
  if (messages.length > 1) {
    document.getElementById('quick-wrap').style.display = 'none';
  }
}

async function sendMessage(text) {
  const input = document.getElementById('input');
  const userText = text || input.value.trim();
  if (!userText || loading) return;

  input.value = '';
  updateSendBtn();
  addMessage('user', userText);
  loading = true;
  renderMessages();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({ role: m.role, content: m.content })),
      }),
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '답변을 가져오지 못했어요. 다시 시도해 주세요.';
    loading = false;
    addMessage('assistant', reply);
  } catch {
    loading = false;
    addMessage('assistant', '오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
  }

  input.focus();
}

function updateSendBtn() {
  const btn = document.getElementById('send-btn');
  const val = document.getElementById('input').value.trim();
  btn.className = val && !loading ? 'active' : '';
}

document.getElementById('input').addEventListener('input', updateSendBtn);
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// 초기 메시지
addMessage('assistant', '안녕하세요! 고려대 CDL 도서관 안내 챗봇이에요 📚\n\n시설 이용, 예약 방법, 자료 대출/반납 등 궁금한 점을 편하게 질문해 주세요!');
</script>
